<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counselor Registration - Guidance Counseling</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <div class="logo">🎓 Guidance Counseling</div>
                <ul>
                    <li><a href="index.html">Home</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <div style="max-width: 500px; margin: 40px auto;">
            <div class="card">
                <div class="card-header">Counselor Registration</div>
                
                <div id="alert" class="alert hidden" style="margin-bottom: 20px;"></div>

                <form id="registerForm">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" name="name" required placeholder="Enter your full name">
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" required placeholder="Enter your email">
                    </div>

                    <div class="form-group">
                        <label for="specialization">Specialization</label>
                        <select id="specialization" name="specialization">
                            <option value="General Counseling">General Counseling</option>
                            <option value="Academic Counseling">Academic Counseling</option>
                            <option value="Career Counseling">Career Counseling</option>
                            <option value="Mental Health">Mental Health</option>
                            <option value="Stress Management">Stress Management</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required minlength="6" placeholder="Enter a strong password">
                        <small>Minimum 6 characters</small>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" required minlength="6" placeholder="Confirm your password">
                    </div>

                    <div class="form-group">
                        <label for="secretKey">Counselor Secret Key</label>
                        <input type="password" id="secretKey" name="secretKey" required placeholder="Enter the authorized secret key">
                        <small>Only authorized personnel can create counselor account</small>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 15px;">Register</button>
                </form>

                <p style="text-align: center;">
                    Already have an account? <a href="counselor-login.html" style="color: #3498db;">Login here</a>
                </p>
            </div>
        </div>
    </main>

    <footer style="text-align: center;">
        <p>&copy; 2026 Anonymous Guidance Counseling System. All rights reserved.</p>
    </footer>

    <script src="js/config.js"></script>
    <script>
        const API_URL = window.APP_CONFIG.API_URL;

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const specialization = document.getElementById('specialization').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const secretKey = document.getElementById('secretKey').value;

            if (password !== confirmPassword) {
                showAlert('Passwords do not match', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/counselors/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ name, email, password, specialization, secretKey })
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert('Registration successful! Redirecting to dashboard...', 'success');
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('counselorId', data.counselor.id);
                    localStorage.setItem('counselorName', data.counselor.name);
                    localStorage.setItem('userType', 'counselor');
                    setTimeout(() => {
                        window.location.href = 'counselor-dashboard.html';
                    }, 1500);
                } else {
                    showAlert(data.message || 'Registration failed', 'error');
                }
            } catch (error) {
                showAlert('Error: ' + error.message, 'error');
            }
        });

        function showAlert(message, type) {
            const alertDiv = document.getElementById('alert');
            alertDiv.textContent = message;
            alertDiv.className = `alert alert-${type}`;
        }
    </script>
</body>
</html>
